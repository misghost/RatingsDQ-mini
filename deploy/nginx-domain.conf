# ---------------------------------------------------------------------------
# df.ratings.ink — 已备案域名 + 受信任 HTTPS 证书
# 仅在证书文件就位后，由 deploy 脚本并入 sites-enabled 并 reload nginx。
# 证书路径（Let's Encrypt / 用户提供的证书）：
#   /etc/ssl/rating/df.ratings.ink.fullchain.pem
#   /etc/ssl/rating/df.ratings.ink.privkey.pem
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name df.ratings.ink;

    ssl_certificate     /etc/ssl/rating/df.ratings.ink.fullchain.pem;
    ssl_certificate_key /etc/ssl/rating/df.ratings.ink.privkey.pem;

    # 安全：现代协议与加密套件
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 微信域名校验文件（MP_verify_*.txt 等）直接根路径托管
    location ~* ^/(MP_verify_)?[A-Za-z0-9_]+\.txt$ {
        root /opt/rating-engine/verify;
        default_type text/plain;
    }

    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Openid "";   # 由后端按会话/令牌判定
    }
}

# 可选：将 http://df.ratings.ink 也强制跳转到 https
server {
    listen 80;
    listen [::]:80;
    server_name df.ratings.ink;
    return 301 https://$host$request_uri;
}

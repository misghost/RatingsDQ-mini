<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>评级到期提醒 · 小程序演示 (v1.0.1)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    background: #e9ebef; display: flex; justify-content: center; padding: 20px 0;
  }
  /* 手机外壳 */
  .phone {
    width: 375px; height: 760px; background: #f5f6f8; border-radius: 40px;
    box-shadow: 0 12px 40px rgba(0,0,0,.25); overflow: hidden; position: relative;
    border: 10px solid #1c1c1e;
  }
  .statusbar {
    height: 36px; background: #07c160; display: flex; align-items: center;
    justify-content: space-between; padding: 0 18px; color: #fff; font-size: 13px; font-weight: 600;
  }
  .navbar {
    height: 44px; background: #07c160; color: #fff; display: flex;
    align-items: center; justify-content: center; font-size: 17px; font-weight: 600;
  }
  .screen { height: calc(760px - 36px - 44px - 56px); overflow-y: auto; }
  /* tabBar */
  .tabbar {
    height: 56px; background: #fff; border-top: 1px solid #eee;
    display: flex; position: absolute; bottom: 0; left: 0; right: 0;
  }
  .tab {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 11px; color: #9aa0a6; gap: 3px;
  }
  .tab.active { color: #07c160; }
  .tab .ic { font-size: 20px; }

  /* ===== 首页 guest 视图 ===== */
  .guest-hero { padding: 30px 24px 20px; background: linear-gradient(135deg, #07c160, #06ad56); }
  .guest-logo { font-size: 22px; font-weight: 700; color: #fff; text-align: center; }
  .guest-desc { font-size: 13px; color: rgba(255,255,255,.88); text-align: center; margin-top: 10px; line-height: 1.6; }
  .summary { display: flex; background: #fff; margin: 10px 12px; border-radius: 8px; padding: 12px 0; }
  .sum-item { flex: 1; text-align: center; }
  .num { display: block; font-size: 20px; font-weight: 600; }
  .lbl { font-size: 11px; color: #9aa0a6; }
  .filters { display: flex; margin: 4px 12px; }
  .filter { flex: 1; text-align: center; padding: 8px 0; font-size: 13px; color: #5a6066; background: #fff; margin-right: 6px; border-radius: 6px; }
  .filter:last-child { margin-right: 0; }
  .filter.active { color: #07c160; font-weight: 600; background: #e8f8ef; }
  .demo-hint { text-align: center; font-size: 12px; color: #9aa0a6; padding: 8px 0; }
  .card { background: #fff; margin: 8px 12px; border-radius: 8px; padding: 12px; }
  .rating-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .subject { font-size: 15px; font-weight: 600; }
  .tag { font-size: 11px; padding: 2px 7px; border-radius: 10px; }
  .row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 13px; }
  .k { color: #9aa0a6; } .v { color: #1f2329; }
  .login-cta { position: absolute; left: 0; right: 0; bottom: 56px; padding: 10px 24px; background: #fff; box-shadow: 0 -1px 6px rgba(0,0,0,.06); }
  .btn-primary { width: 100%; border-radius: 24px; font-size: 16px; height: 44px; line-height: 44px; background: #07c160; color: #fff; border: none; }
  .btn-ghost { background: #e8f8ef; color: #07c160; }

  /* ===== 登录视图 ===== */
  .login-wrap { padding: 60px 24px 30px; }
  .logo { font-size: 24px; font-weight: 600; text-align: center; }
  .sub { color: #9aa0a6; text-align: center; margin-top: 8px; font-size: 13px; }
  .err-banner { margin-top: 15px; padding: 8px 12px; background: #fff3e0; border-radius: 6px; border-left: 3px solid #ff976a; font-size: 12px; color: #e65100; line-height: 1.5; }
  .role-card { margin-top: 30px; background: #fff; border-radius: 8px; padding: 14px; }
  .role-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
  .sm { font-size: 12px; margin-top: 6px; color: #9aa0a6; }
  .login-btn { margin-top: 40px; }
  .skip-row { margin-top: 20px; text-align: center; }
  .skip-text { font-size: 14px; color: #9aa0a6; }
  /* 开关 mock */
  .switch { width: 46px; height: 26px; border-radius: 13px; background: #07c160; position: relative; transition: .2s; }
  .switch.off { background: #ccc; }
  .switch .dot { width: 22px; height: 22px; border-radius: 50%; background: #fff; position: absolute; top: 2px; right: 2px; transition: .2s; }
  .switch.off .dot { right: 22px; }

  .toast { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,.8); color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 99; display: none; }
  .badge { display:inline-block; background:#07c160; color:#fff; font-size:10px; padding:1px 6px; border-radius:8px; margin-left:6px; vertical-align:middle;}
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar"><span>9:41</span><span>📶 🔋</span></div>
  <div class="navbar" id="navTitle">评级到期提醒</div>
  <div class="screen" id="screen"></div>
  <div class="tabbar" id="tabbar">
    <div class="tab active" data-tab="home" onclick="goHome()"><span class="ic">📋</span>我的提醒</div>
    <div class="tab" data-tab="upload" onclick="goUpload()"><span class="ic">📤</span>上传数据</div>
    <div class="tab" data-tab="admin" onclick="goAdmin()"><span class="ic">📊</span>管理总览</div>
  </div>
  <div class="toast" id="toast"></div>
</div>

<script>
// ===== 示例数据（与 index.js DEMO_RATINGS 一致）=====
const DEMO = [
  { subject:'XX有限公司2024年度主体信用评级', contract_no:'HT2024-001', expiry_date:'2025-03-15', remind_date:'2024-12-15', status:'overdue', debt_type:'企业债', project_type:'信用评级', attribution:'市场人员A' },
  { subject:'YY集团2025年中期票据评级', contract_no:'HT2025-042', expiry_date:'2025-09-20', remind_date:'2025-06-20', status:'due', debt_type:'中期票据', project_type:'跟踪评级', attribution:'市场人员B' },
  { subject:'ZZ股份公司债券评级', contract_no:'HT2024-088', expiry_date:'2026-01-10', remind_date:'2025-10-10', status:'upcoming', debt_type:'公司债', project_type:'初次评级', attribution:'市场人员C' },
  { subject:'AA实业2025年度跟踪评级', contract_no:'HT2025-103', expiry_date:'2025-11-30', remind_date:'2025-08-30', status:'upcoming', debt_type:'企业债', project_type:'跟踪评级', attribution:'市场人员A' },
  { subject:'BB控股有限公可转债评级', contract_no:'HT2024-156', expiry_date:'2025-02-28', remind_date:'2024-11-28', status:'overdue', debt_type:'可转债', project_type:'信用评级', attribution:'市场人员B' },
];
const META = {
  overdue:  { label:'已过期', color:'#e54d42', bg:'#fde9e7' },
  due:      { label:'即将到期', color:'#ff976a', bg:'#fff0e6' },
  upcoming: { label:'有效期内', color:'#07c160', bg:'#e8f8ef' },
};
function fmt(d){ if(!d) return '—'; const [y,m,dd]=d.split('-'); return `${y}-${m}-${dd}`; }
function daysLeft(d){ if(!d) return null; const t=new Date(d).getTime()-Date.now(); return Math.round(t/86400000); }

let activeFilter = 'all';
let isAdmin = false;
let loggedIn = false;

function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',2000); }
function setNav(t){ document.getElementById('navTitle').textContent=t; }
function setActiveTab(name){ document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===name)); }

// ===== 首页（guest / 已登录 共用视觉）=====
function renderHome(){
  setNav('评级到期提醒'); setActiveTab('home');
  const all = DEMO.map(r=>({...r, meta:META[r.status], expiry:fmt(r.expiry_date), remind:fmt(r.remind_date), left:daysLeft(r.expiry_date)}));
  const summary = { overdue:0, due:0, upcoming:0, total:all.length };
  all.forEach(r=>summary[r.status]++);
  const list = activeFilter==='all' ? all : all.filter(r=>r.status===activeFilter);

  const filters = [['all','全部'],['overdue','已过期'],['due','即将到期'],['upcoming','有效期内']]
    .map(([k,l])=>`<div class="filter ${activeFilter===k?'active':''}" onclick="setFilter('${k}')">${l}</div>`).join('');

  const cards = list.map(r=>`
    <div class="card">
      <div class="rating-top">
        <span class="subject">${r.subject}</span>
        <span class="tag" style="color:${r.meta.color};background:${r.meta.bg}">${r.meta.label}</span>
      </div>
      <div class="row"><span class="k">合同号</span><span class="v">${r.contract_no}</span></div>
      <div class="row"><span class="k">债务类型</span><span class="v">${r.debt_type}</span></div>
      <div class="row"><span class="k">项目类型</span><span class="v">${r.project_type}</span></div>
      <div class="row"><span class="k">到期日</span><span class="v">${r.expiry}</span></div>
      <div class="row"><span class="k">提醒日</span><span class="v">${r.remind}</span></div>
      <div class="row"><span class="k">剩余</span><span class="v" style="color:${r.meta.color}">${r.left>=0?r.left+' 天':'已超 '+Math.abs(r.left)+' 天'}</span></div>
    </div>`).join('');

  const guestCta = !loggedIn ? `
    <div class="login-cta"><button class="btn-primary" onclick="goLogin()">立即登录，查看我的数据</button></div>` : '';
  const guestHint = !loggedIn ? `<div class="demo-hint">（当前为示例数据，登录后查看个人专属数据）</div>` : '';

  document.getElementById('screen').innerHTML = `
    <div class="guest-hero">
      <div class="guest-logo">评级到期提醒</div>
      <div class="guest-desc">实时跟踪客户信用评级到期情况，自动提醒即将过期和已过期的评级项目，助您及时续做、避免遗漏。</div>
    </div>
    <div class="summary">
      <div class="sum-item"><span class="num" style="color:#e54d42">${summary.overdue}</span><span class="lbl">已过期</span></div>
      <div class="sum-item"><span class="num" style="color:#ff976a">${summary.due}</span><span class="lbl">即将到期</span></div>
      <div class="sum-item"><span class="num" style="color:#07c160">${summary.upcoming}</span><span class="lbl">有效期内</span></div>
      <div class="sum-item"><span class="num">${summary.total}</span><span class="lbl">合计</span></div>
    </div>
    <div class="filters">${filters}</div>
    ${guestHint}
    ${cards}
    ${guestCta}`;
}
function setFilter(k){ activeFilter=k; renderHome(); }

// ===== 登录页 =====
function goLogin(){
  setNav('登录'); setActiveTab('home');
  document.getElementById('screen').innerHTML = `
    <div class="login-wrap">
      <div class="logo">评级到期提醒</div>
      <div class="sub">登录后可查看个人专属到期提醒、上传合同数据</div>
      <div class="err-banner" id="errBanner" style="display:none"></div>
      <div class="role-card">
        <div class="role-row">
          <span>以管理员身份登录</span>
          <div class="switch ${isAdmin?'':'off'}" id="admSwitch" onclick="toggleAdmin()"><div class="dot"></div></div>
        </div>
        <div class="sm">管理员可上传后台源数据、查看全员总览</div>
      </div>
      <button class="btn-primary login-btn" onclick="doLogin()">${isAdmin?'管理员登录':'微信登录'}</button>
      <div class="skip-row" onclick="renderHome()"><span class="skip-text">暂不登录，先浏览</span></div>
    </div>`;
}
function toggleAdmin(){ isAdmin=!isAdmin; document.getElementById('admSwitch').classList.toggle('off',!isAdmin);
  const btn=document.querySelector('.login-btn'); btn.textContent=isAdmin?'管理员登录':'微信登录'; }
function doLogin(){
  // 演示：模拟"后端不可达"时不会弹"登录失败"，而是友好提示
  const ok = confirm('这是演示环境，模拟后端返回：\n\n[确定] = 登录成功（后端可达）\n[取消] = 网络不可达（验证降级提示）');
  if(ok){
    loggedIn=true;
    if(isAdmin){ toast('管理员登录成功'); }
    else { toast('微信登录成功'); }
    setTimeout(renderHome, 600);
  } else {
    // 模拟 v1.0.1 的优雅降级：不再出现"登录失败"
    const b=document.getElementById('errBanner');
    b.textContent='网络连接失败，请检查网络后重试';
    b.style.display='block';
    toast('网络连接失败，请检查网络后重试');
  }
}

// ===== 上传 / 管理 页（未登录提示）=====
function goUpload(){
  setNav('上传数据'); setActiveTab('upload');
  if(!loggedIn){
    document.getElementById('screen').innerHTML = `
      <div class="login-wrap" style="padding-top:100px;text-align:center">
        <div style="font-size:40px">📤</div>
        <div style="font-size:16px;font-weight:600;margin:10px 0">登录后上传数据</div>
        <div style="font-size:13px;color:#9aa0a6;margin-bottom:30px">请先登录，再使用数据上传功能</div>
        <button class="btn-primary" style="width:200px" onclick="goLogin()">去登录</button>
      </div>`;
    return;
  }
  document.getElementById('screen').innerHTML = `<div class="login-wrap"><div class="logo">上传（演示）</div><div class="sub">已登录，可上传合同/承揽/作业数据</div></div>`;
}
function goAdmin(){
  setNav('管理总览'); setActiveTab('admin');
  if(!loggedIn){
    document.getElementById('screen').innerHTML = `
      <div class="login-wrap" style="padding-top:100px;text-align:center">
        <div style="font-size:40px">📊</div>
        <div style="font-size:16px;font-weight:600;margin:10px 0">管理员登录后查看</div>
        <div style="font-size:13px;color:#9aa0a6;margin-bottom:30px">请以管理员身份登录后查看全员总览</div>
        <button class="btn-primary" style="width:200px" onclick="goLogin()">去登录</button>
      </div>`;
    return;
  }
  if(!isAdmin){
    document.getElementById('screen').innerHTML = `<div class="login-wrap" style="padding-top:120px;text-align:center;color:#9aa0a6">无权限：仅管理员可查看总览</div>`;
    return;
  }
  document.getElementById('screen').innerHTML = `<div class="login-wrap"><div class="logo">管理总览（演示）</div><div class="sub">管理员已登录，可查看全员总览</div></div>`;
}
function goHome(){ loggedIn = loggedIn; renderHome(); }

// 初始：未登录 → 展示示例数据 + 登录引导（v1.0.1 修复核心）
renderHome();
</script>
</body>
</html>
